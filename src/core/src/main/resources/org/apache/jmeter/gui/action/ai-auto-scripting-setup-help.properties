text=AI Auto Scripting (Beta)\n\
\n\
What it does\n\
AI Auto Scripting starts a local coding-agent CLI from BreakTest and gives it a built-in repair prompt. The agent uses the BreakTest agent bridge to inspect the open plan, read validation evidence, use linked HAR recordings when available, apply supported edits, and report progress back into the AI log.\n\
\n\
Local agent permissions\n\
The run uses broad local-agent permissions because the selected tool may edit JMX files, call the BreakTest bridge, validate the plan, and read local evidence files. BreakTest creates a backup before the run starts, and the Start button stays disabled until you approve the dangerous local-agent settings in the dialog.\n\
\n\
MCP and bridge setup\n\
BreakTest starts its local agent bridge when the agent is enabled. The AI Auto Scripting launcher calls the bridge through the bundled command-line helper, so Codex, Claude Code, and OpenCode can interact with the currently open BreakTest GUI without you starting another server manually.\n\
\n\
For manual Codex sessions that should talk to BreakTest directly, add this MCP server to the Codex config and restart Codex:\n\
\n\
[mcp_servers.breaktest]\n\
command = "<BREAKTEST_HOME>/bin/breaktest-agent-mcp"\n\
\n\
Replace <BREAKTEST_HOME> with the folder that contains your BreakTest bin directory.\n\
\n\
Tool selection\n\
Codex uses `codex exec` and the Codex CLI defaults unless BreakTest properties override them.\n\
Claude Code uses Claude Code print mode and the Claude Code defaults unless BreakTest properties override them.\n\
OpenCode uses `opencode run` and the OpenCode provider/model/agent configured on your machine unless BreakTest properties override them.\n\
\n\
Recommended harnesses\n\
Codex and Claude Code are currently the preferred harnesses for AI Auto Scripting. They have been the most reliable choices for long repair loops, structured tool use, and following the BreakTest scripting rules.\n\
\n\
OpenCode support is available for experimentation, especially for local or OpenAI-compatible models, but it is not yet proven to work as well for full AI Repair runs.\n\
\n\
BreakTest does not choose a separate fast/standard variant. Model, thinking, speed, and provider behavior come from the selected CLI tool defaults or from that tool's own config. Use the CLI's normal configuration if you want a different model, reasoning level, provider, or local LM Studio model.\n\
\n\
Useful BreakTest properties\n\
breaktest.ai.tool                 Default tool: codex, claude, or opencode\n\
breaktest.ai.edit_surface         Default edit surface: gui or non-gui\n\
breaktest.agent.tool              Path to the BreakTest agent bridge helper\n\
\n\
breaktest.codex.command           Codex executable, default `codex`\n\
breaktest.codex.model             Optional Codex model override\n\
breaktest.codex.cwd               Optional Codex working directory\n\
breaktest.codex.sandbox           Codex sandbox setting used by the launcher\n\
breaktest.codex.approval          Codex approval setting used by the launcher\n\
\n\
breaktest.claude.command          Claude Code executable, default `claude`\n\
breaktest.claude.model            Optional Claude model override\n\
breaktest.claude.max_turns        Optional Claude max-turns limit\n\
breaktest.claude.cwd              Optional Claude working directory\n\
\n\
breaktest.opencode.command        OpenCode executable, default `opencode`\n\
breaktest.opencode.model          Optional OpenCode model override\n\
breaktest.opencode.agent          Optional OpenCode agent override\n\
breaktest.opencode.cwd            Optional OpenCode working directory\n\
\n\
Edit surfaces\n\
GUI mode edits the currently open plan through GUI-backed BreakTest bridge tools, so changes can be tracked in the AI log and changes table.\n\
\n\
Non-GUI mode saves the current GUI state to a repair JMX clone first, then lets the agent edit that clone. When it finishes, BreakTest can offer to merge or load the generated result.\n\
\n\
During a run\n\
Progress appears in the AI Auto Scripting log pane or window. The Stop button stops the running local AI process. Maximum runtime and similar retry limit are sent to the agent so long-running or repetitive repair loops can be bounded.
