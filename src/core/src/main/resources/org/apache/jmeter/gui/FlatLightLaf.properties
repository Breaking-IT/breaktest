# BreakTest light theme, applied to FlatLightLaf and FlatMacLightLaf (which
# extends it). Matches the breakingit website: soft blue-gray surfaces
# instead of stark white, white inputs on top, and a small touch of the
# brand gold on inactive selections and tab underlines.
@background = #f6f8fb
@componentBackground = #ffffff
@menuBackground = #ffffff
ToolBar.background = #ffffff
Panel.background = #f6f8fb
Tree.background = #ffffff
Table.background = #ffffff

# Touch of brand gold (website --gold / --gold-soft)
TabbedPane.underlineColor = #c8901e
Tree.selectionInactiveBackground = #fbf3df
Tree.selectionBackground = #2563eb
List.selectionInactiveBackground = #fbf3df
Table.selectionInactiveBackground = #fbf3df
