# BreakTest customizations applied to every FlatLaf theme (Light and Dark).
# See https://www.formdev.com/flatlaf/customizing/ for available keys.

# Brand accent (BreakTest primary blue, matches the breakingit website)
@accentColor = #2563eb

# Rounded corners
Component.arc = 8
Button.arc = 8
CheckBox.arc = 4
ProgressBar.arc = 8
TextComponent.arc = 8

# Modern chevron-style arrows (combo boxes, spinners, tree expand handles)
Component.arrowType = chevron

# Filled checkbox/radio style
CheckBox.icon.style = filled

# Thin, unobtrusive focus ring
Component.focusWidth = 1
Component.innerFocusWidth = 0

# Slim pill-shaped scrollbars without buttons
ScrollBar.width = 12
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.showButtons = false

# Test plan tree: slightly tighter indent (15px/level instead of 18),
# no connector lines, rounded full-width pill selection
Tree.leftChildIndent = 9
Tree.rightChildIndent = 6
Tree.paintLines = false
Tree.selectionArc = 8
Tree.selectionInsets = 0,2,0,2
Tree.wideSelection = true
Tree.showCellFocusIndicator = false

# Menus: rounded selection highlight, rounded popups where the platform allows
MenuItem.selectionArc = 8
MenuItem.selectionInsets = 0,3,0,3
MenuBar.selectionArc = 8
MenuBar.selectionInsets = 2,2,2,2
PopupMenu.borderCornerRadius = 8

# Lists (incl. combo box popups): rounded selection
List.selectionArc = 6
List.selectionInsets = 0,2,0,2

# Tables: light grid lines between rows and columns for readability
Table.showVerticalLines = true
Table.showHorizontalLines = true
Table.showTrailingVerticalLine = true
Table.intercellSpacing = 1,1

# Tabs
TabbedPane.showTabSeparators = true
TabbedPane.tabSeparatorsFullHeight = false

# Toolbar: rounded hover highlight on grouped buttons
ToolBar.hoverButtonGroupArc = 8

# Flat split-pane dividers without the grip dots
SplitPaneDivider.style = plain
