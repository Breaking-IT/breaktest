# Icons order. Keys separate by comma. Use a pipe | to have a space between two icons.
toolbar=new,templates,open,save,|,undo,redo,cut,copy,paste,|,expand,collapse,toggle,|,test_validate,test_start,test_start_notimers,test_pause,test_stop,test_shutdown,|,ai_auto_scripting,|,test_clear,test_clear_all,|,search,search_reset,|,function_helper,settings,help

# Icon / action definition file.
# Key:      button names
# Value:    I18N key in messages.properties, ActionNames key field, icon path, optionally followed by comma and then the pressed icon name
# Special keyword "<SIZE>" for the different size of the same icon (Available sizes are: 22x22, 32x32, 48x48)
new=new,CLOSE,org/apache/jmeter/images/toolbar/icons-modern/file-plus.svg
templates=template_menu,TEMPLATES,org/apache/jmeter/images/toolbar/icons-modern/template.svg
open=menu_open,OPEN,org/apache/jmeter/images/toolbar/icons-modern/folder-open.svg
save=save,SAVE,org/apache/jmeter/images/toolbar/icons-modern/save.svg
save_as_testplan=save_as,SAVE_AS,org/apache/jmeter/images/toolbar/icons-modern/save-as.svg
cut=cut,CUT,org/apache/jmeter/images/toolbar/icons-modern/scissors.svg
copy=copy,COPY,org/apache/jmeter/images/toolbar/icons-modern/copy.svg
paste=paste,PASTE,org/apache/jmeter/images/toolbar/icons-modern/clipboard.svg
test_validate=validate_threadgroup,VALIDATE_TG,org/apache/jmeter/images/toolbar/icons-modern/validate.svg
test_start=start,ACTION_START,org/apache/jmeter/images/toolbar/icons-modern/play.svg
test_start_notimers=start_no_timers,ACTION_START_NO_TIMERS,org/apache/jmeter/images/toolbar/icons-modern/play-no-timers.svg
test_pause=pause,ACTION_PAUSE,org/apache/jmeter/images/toolbar/icons-modern/pause.svg
test_stop=stop,ACTION_STOP,org/apache/jmeter/images/toolbar/icons-modern/stop.svg
test_shutdown=shutdown,ACTION_SHUTDOWN,org/apache/jmeter/images/toolbar/icons-modern/shutdown.svg
ai_auto_scripting=ai_auto_scripting,AI_AUTO_SCRIPTING,org/apache/jmeter/images/toolbar/icons-modern/ai.svg
test_clear=clear,CLEAR,org/apache/jmeter/images/toolbar/icons-modern/clear.svg
test_clear_all=clear_all,CLEAR_ALL,org/apache/jmeter/images/toolbar/icons-modern/clear-all.svg
toggle=toggle,TOGGLE,org/apache/jmeter/images/toolbar/icons-modern/toggle.svg
expand=menu_expand_all,EXPAND_ALL,org/apache/jmeter/images/toolbar/icons-modern/expand.svg
collapse=menu_collapse_all,COLLAPSE_ALL,org/apache/jmeter/images/toolbar/icons-modern/collapse.svg
search=menu_search,SEARCH_TREE,org/apache/jmeter/images/toolbar/icons-modern/search.svg
search_reset=menu_search_reset,SEARCH_RESET,org/apache/jmeter/images/toolbar/icons-modern/search-reset.svg
function_helper=function_dialog_menu_item,FUNCTIONS,org/apache/jmeter/images/toolbar/icons-modern/functions.svg
settings=settings,SETTINGS,org/apache/jmeter/images/toolbar/icons-modern/config.svg
help=help,HELP,org/apache/jmeter/images/toolbar/icons-modern/help.svg
undo=undo,UNDO,org/apache/jmeter/images/toolbar/icons-modern/undo.svg
redo=redo,REDO,org/apache/jmeter/images/toolbar/icons-modern/redo.svg
