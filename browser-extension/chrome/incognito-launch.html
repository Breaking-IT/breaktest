<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open BreakTest Recorder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="launcher-page">
  <main class="launcher-main">
    <section class="card launcher-card">
      <img src="icons/icon128.png" width="72" height="72" alt="">
      <div>
        <p class="launcher-eyebrow">Incognito recording</p>
        <h1>BreakTest Recorder</h1>
      </div>
      <p id="launcher-status">Preparing the isolated recorder…</p>
      <dl id="launch-details" hidden>
        <div>
          <dt>Transaction</dt>
          <dd id="launch-transaction"></dd>
        </div>
        <div>
          <dt>Start URL</dt>
          <dd id="launch-url"></dd>
        </div>
      </dl>
      <button id="open-recorder-button" class="primary launcher-button" disabled>Open recorder</button>
      <p class="hint">Chrome requires this click before an extension may open its side panel. BreakTest will attach the recorder before loading the start URL.</p>
    </section>
  </main>
  <script type="module" src="incognito-launch.js"></script>
</body>
</html>
