name: Bug report
description: Create a report and help us improve
labels:
  - defect
  - to-triage
body:
  - type: markdown
    attributes:
      value: |
        Please fill in all required fields with as many details as possible.
        If the behavior differs from Apache JMeter, please include the JMeter version you compared against.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: |
        Describe what you expected BreakTest to do
      placeholder: |
        Here you can also attach log files, screenshots or a video
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: |
        Describe what you observed BreakTest did instead
      placeholder: |
        Here you can also attach log files (e.g. jmeter.log), screenshots or a video
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce the problem
      description: |
        - If the problem relates to a third-party plugin, consider removing them first
      placeholder: |
        Here you can also attach log files, screenshots or a video
    validations:
      required: true
  - type: input
    id: breaktest-version
    attributes:
      label: BreakTest Version
      description: |
        What BreakTest version did you use?
        If you also reproduced or compared the behavior with Apache JMeter, include that version as well.
      placeholder: ex. 2026.07.03
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java Version
      description: What JDK version and distribution did you use (use `java -version`)
      placeholder: ex. openjdk version "21" 2023-09-19
  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: What operating system version and distribution did you use (use e.g. `ver` on Windows)
      placeholder: ex. Microsoft Windows [Version 10.0.22000.856]
